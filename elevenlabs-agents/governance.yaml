# ElevenLabs Agent Governance — phase model and schema template
# ==============================================================
#
# This file documents the governance pattern for a fleet of ElevenLabs
# conversational agents. It is a TEMPLATE: the `agents`, `voices`,
# `phone_numbers`, and `audit_log` sections below use placeholder values.
# The live inventory (real agent IDs, phone numbers, linked workflow IDs,
# client names) is operational state and lives outside this public repo.
#
# DEPLOYMENT PHASES:
#   DEV      - Development, freely modifiable
#   ALPHA    - Early testing, clone-only
#   BETA     - User testing, clone-only
#   GA       - General availability, clone-only
#   PROD     - Production, clone-only
#   ARCHIVED - Deprecated, read-only
#
# RULES:
#   - Deletion is discouraged (archive instead)
#   - Only DEV phase agents can be modified
#   - ALPHA/BETA/GA/PROD should be cloned, not modified
#   - New agents auto-tagged as DEV
#   - All agents use [PHASE] prefix in names (no native tagging support)

version: "1.2"
last_updated: "2026-07-23"

settings:
  default_phase: DEV
  require_phase_tag: true
  similarity_threshold: 40
  clone_threshold: 70

# Phase definitions (mirrors workflow governance)
phases:
  DEV:
    description: "Development - active work in progress"
    color: "#4CAF50"
    modifiable: true

  ALPHA:
    description: "Alpha - early internal testing"
    color: "#FFC107"
    modifiable: false
    can_promote_to: [BETA]

  BETA:
    description: "Beta - external/user testing"
    color: "#FF9800"
    modifiable: false
    can_promote_to: [GA]

  GA:
    description: "General Availability - stable release"
    color: "#2196F3"
    modifiable: false
    can_promote_to: [PROD]

  PROD:
    description: "Production - live customer-facing"
    color: "#9C27B0"
    modifiable: false

  ARCHIVED:
    description: "Archived - deprecated, kept for reference"
    color: "#757575"
    modifiable: false

# Tracked agents — schema example with placeholder values.
# One entry per agent; key is the ElevenLabs agent ID.
agents:
  "agent_<elevenlabs-agent-id>":
    name: "[DEV] Example Client - Sarah"
    phase: DEV
    description: "What this agent does and for whom"
    voice_id: "EXAVITQu4vr4xnSDxMaL"      # stock ElevenLabs voice (Sarah)
    phone_number_id: "phnum_<elevenlabs-phone-id>"
    phone_number: "+1XXXXXXXXXX"
    created: "2026-01-01T00:00:00Z"
    modified: "2026-01-01T00:00:00Z"
    linked_workflows:
      - <n8n-workflow-id>                  # one line per tool/webhook workflow
    history:
      - action: created
        phase: DEV
        timestamp: "2026-01-01T00:00:00Z"

# Voice inventory — map voice_id -> agents using it.
voices:
  "EXAVITQu4vr4xnSDxMaL":
    name: "Sarah"
    used_by:
      - agent_<elevenlabs-agent-id>

# Phone numbers inventory — map phone_number_id -> assignment.
phone_numbers:
  "phnum_<elevenlabs-phone-id>":
    number: "+1XXXXXXXXXX"
    assigned_to: agent_<elevenlabs-agent-id>
    provider: "twilio"
    label: "trial"
    supports_inbound: true
    supports_outbound: true

# Governance audit trail — append-only.
audit_log:
  - timestamp: "2026-07-23T00:00:00Z"
    action: "sanitization"
    findings:
      - "Replaced live agent/phone/workflow identifiers and client names with schema placeholders; live inventory moved out of the public tree"
    performed_by: "governance-maintainer"
