name: reindex

on:
  push:
    branches: [main]
    paths:
      - "workflow-patterns/**"
      - "technical-research/**"
      - "elevenlabs-agents/**"
      - "scripts/build-index.mjs"
      - ".github/workflows/reindex.yml"
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reindex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: true
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af  # v4.1.0
        with:
          node-version: "20"
      - name: build dist/index.json
        run: node scripts/build-index.mjs
      - name: commit if changed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain dist/index.json)" ]]; then
            echo "no index changes — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/index.json
          git commit -m "chore(nkb): rebuild dist/index.json [skip ci]"
          git push
